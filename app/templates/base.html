<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cricket Match Predictor{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --bg-tertiary: #1f2937;
            --accent-primary: #10b981;
            --accent-secondary: #3b82f6;
            --accent-warning: #f59e0b;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-color: #374151;
            --gradient-1: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            --gradient-2: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
        }
        
        .navbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-primary);
        }
        
        .nav-dropdown {
            position: relative;
        }
        
        .nav-dropdown > a {
            cursor: pointer;
        }
        
        .nav-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem 0;
            min-width: 180px;
            z-index: 200;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        
        .nav-dropdown:hover .nav-dropdown-menu {
            display: block;
        }
        
        .nav-dropdown-menu a {
            display: block;
            padding: 0.5rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
        }
        
        .nav-dropdown-menu a:hover {
            background: var(--bg-tertiary);
            color: var(--accent-primary);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--gradient-1);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }
        
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-secondary:hover {
            background: var(--border-color);
        }
        
        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .grid {
            display: grid;
            gap: 1.5rem;
        }
        
        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }
        
        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }
        
        @media (max-width: 768px) {
            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }
            
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        .probability-bar {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        
        .probability-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .table th, .table td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .table th {
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .table tr:hover {
            background: var(--bg-tertiary);
        }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .badge-success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-primary);
        }
        
        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-warning);
        }
        
        .loading {
            display: flex;
            justify-content: center;
            padding: 2rem;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hero {
            text-align: center;
            padding: 4rem 2rem;
        }
        
        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .timezone-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .timezone-selector label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin: 0;
        }
        
        .timezone-selector select {
            width: auto;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
        }

        /* Polymarket geoblock / VPN status (all pages) */
        .pm-geoblock-banner {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.85rem;
            flex-wrap: wrap;
            padding: 0.65rem 1.25rem;
            border-bottom: 2px solid transparent;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            line-height: 1.35;
        }
        .pm-geoblock-banner.visible { display: flex; }
        .pm-geoblock-banner .pm-geo-icon {
            font-size: 1.35rem;
            line-height: 1;
            flex-shrink: 0;
        }
        .pm-geoblock-banner .pm-geo-title {
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .pm-geoblock-banner .pm-geo-detail {
            font-weight: 500;
            opacity: 0.92;
            font-size: 0.82rem;
        }
        .pm-geoblock-banner.blocked {
            background: linear-gradient(90deg, rgba(127, 29, 29, 0.95) 0%, rgba(185, 28, 28, 0.92) 50%, rgba(127, 29, 29, 0.95) 100%);
            border-bottom-color: #fca5a5;
            color: #fff;
            box-shadow: 0 0 24px rgba(239, 68, 68, 0.45);
            animation: pm-geo-pulse 2s ease-in-out infinite;
        }
        .pm-geoblock-banner.ok {
            background: rgba(6, 78, 59, 0.35);
            border-bottom-color: rgba(16, 185, 129, 0.45);
            color: #6ee7b7;
        }
        .pm-geoblock-banner.unknown {
            background: rgba(120, 53, 15, 0.35);
            border-bottom-color: rgba(245, 158, 11, 0.5);
            color: #fcd34d;
        }
        @keyframes pm-geo-pulse {
            0%, 100% { box-shadow: 0 0 18px rgba(239, 68, 68, 0.35); }
            50% { box-shadow: 0 0 32px rgba(239, 68, 68, 0.65); }
        }
        body.page-live-trading .pm-geoblock-banner.blocked {
            padding: 1rem 1.5rem;
            font-size: 1.05rem;
        }
        body.page-live-trading .pm-geoblock-banner.blocked .pm-geo-icon { font-size: 1.75rem; }
        body.page-live-trading .pm-geoblock-banner.blocked .pm-geo-title { font-size: 1.15rem; }
        body.page-live-trading .pm-geoblock-banner.ok {
            padding: 0.75rem 1.25rem;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="{% if request.path in ['/live-betting', '/live-risk'] %}page-live-trading{% endif %}">
    <nav class="navbar">
        <a href="/" class="logo">Cricket Predictor</a>
        <ul class="nav-links">
            <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a></li>
            <li><a href="/training" class="{% if request.path == '/training' %}active{% endif %}">Data & Training</a></li>
            <li><a href="/data-explorer" class="{% if request.path == '/data-explorer' %}active{% endif %}">Data Explorer</a></li>
            <li><a href="/team-explorer" class="{% if request.path == '/team-explorer' %}active{% endif %}">Team Explorer</a></li>
            <li class="nav-dropdown">
                <a class="{% if request.path in ['/predict', '/bulk-predict'] %}active{% endif %}">Predict ▾</a>
                <div class="nav-dropdown-menu">
                    <a href="/predict" class="{% if request.path == '/predict' %}active{% endif %}">Single Match</a>
                    <a href="/bulk-predict" class="{% if request.path == '/bulk-predict' %}active{% endif %}">Bulk Predict</a>
                </div>
            </li>
            <li><a href="/rankings" class="{% if request.path == '/rankings' %}active{% endif %}">Rankings</a></li>
            <li><a href="/live-betting" class="{% if request.path == '/live-betting' %}active{% endif %}">Live Betting</a></li>
            <li><a href="/live-risk" class="{% if request.path == '/live-risk' %}active{% endif %}">Live Risk</a></li>
            <li><a href="/paper-trades" class="{% if request.path == '/paper-trades' %}active{% endif %}">Paper Trades</a></li>
        </ul>
        <div class="timezone-selector">
            <label for="timezone-select">🌍</label>
            <select id="timezone-select" onchange="setTimezone(this.value)">
                <option value="Australia/Melbourne">Melbourne</option>
                <option value="Australia/Sydney">Sydney</option>
                <option value="Australia/Brisbane">Brisbane</option>
                <option value="Australia/Perth">Perth</option>
                <option value="Asia/Kolkata">India</option>
                <option value="Europe/London">London</option>
                <option value="America/New_York">New York</option>
                <option value="Asia/Dubai">Dubai</option>
                <option value="Pacific/Auckland">Auckland</option>
            </select>
        </div>
    </nav>

    <div id="pm-geoblock-banner" class="pm-geoblock-banner" role="alert" aria-live="polite" hidden>
        <span class="pm-geo-icon" id="pm-geo-icon" aria-hidden="true"></span>
        <div>
            <div class="pm-geo-title" id="pm-geo-title"></div>
            <div class="pm-geo-detail" id="pm-geo-detail"></div>
        </div>
    </div>
    
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    
    <script>
        // Utility functions
        async function fetchAPI(url, options = {}) {
            try {
                const response = await fetch(url, {
                    headers: { 'Content-Type': 'application/json' },
                    ...options
                });
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return { success: false, error: error.message };
            }
        }
        
        function formatNumber(num, decimals = 0) {
            return num.toLocaleString('en-US', { 
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals 
            });
        }
        
        function formatPercent(num) {
            return (num * 100).toFixed(1) + '%';
        }
        
        // Global timezone management
        let currentTimezone = localStorage.getItem('cricket_timezone') || 'Australia/Melbourne';
        
        function setTimezone(tz) {
            currentTimezone = tz;
            localStorage.setItem('cricket_timezone', tz);
            // Dispatch event for pages that need to react to timezone changes
            window.dispatchEvent(new CustomEvent('timezoneChanged', { detail: { timezone: tz } }));
        }
        
        // Initialize timezone selector on page load
        document.addEventListener('DOMContentLoaded', () => {
            const tzSelect = document.getElementById('timezone-select');
            if (tzSelect) {
                tzSelect.value = currentTimezone;
            }
            pmRefreshGeoblock();
            setInterval(pmRefreshGeoblock, 45000);
        });

        async function pmRefreshGeoblock() {
            const banner = document.getElementById('pm-geoblock-banner');
            const icon = document.getElementById('pm-geo-icon');
            const title = document.getElementById('pm-geo-title');
            const detail = document.getElementById('pm-geo-detail');
            if (!banner || !icon || !title || !detail) return;

            let data;
            try {
                const r = await fetch('/api/betting/geoblock');
                const ct = (r.headers.get('content-type') || '').toLowerCase();
                if (!r.ok) {
                    let errText = '';
                    if (ct.includes('application/json')) {
                        const j = await r.json();
                        errText = j.error || j.message || JSON.stringify(j);
                    } else {
                        errText = (await r.text()).slice(0, 120) || r.statusText;
                    }
                    if (r.status === 404) {
                        data = {
                            check_failed: true,
                            message: 'Geoblock API not found — restart the Flask app to load the new route.',
                            error: errText,
                        };
                    } else {
                        data = { check_failed: true, message: `Geoblock API HTTP ${r.status}`, error: errText };
                    }
                } else {
                    data = ct.includes('application/json') ? await r.json() : { check_failed: true, message: 'Invalid geoblock response' };
                }
            } catch (err) {
                data = { success: false, check_failed: true, message: 'Geoblock check failed: ' + err.message };
            }

            banner.classList.remove('blocked', 'ok', 'unknown', 'visible');
            banner.hidden = false;

            if (data.trading_ok) {
                const isLivePage = document.body.classList.contains('page-live-trading');
                if (!isLivePage) {
                    banner.hidden = true;
                    return;
                }
                banner.classList.add('ok', 'visible');
                icon.textContent = '✓';
                title.textContent = 'Polymarket CLOB — all clear';
                const loc = [data.country, data.region].filter(Boolean).join(' / ');
                detail.textContent = loc
                    ? `Trading available from ${loc}${data.ip ? ' (' + data.ip + ')' : ''}`
                    : (data.message || 'VPN / region looks good');
                banner.title = detail.textContent;
                return;
            }

            if (data.blocked === true) {
                banner.classList.add('blocked', 'visible');
                icon.textContent = '⛔';
                title.textContent = 'GEO BLOCKED — live orders will NOT place';
                detail.textContent = data.message || 'Reconnect VPN to an allowed region';
                banner.title = detail.textContent;
                return;
            }

            banner.classList.add('unknown', 'visible');
            icon.textContent = '?';
            title.textContent = 'Could not verify Polymarket region';
            detail.textContent = data.message || data.error || 'Check network / VPN';
            banner.title = detail.textContent;
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
